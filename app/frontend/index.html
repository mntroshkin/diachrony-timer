<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">

    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script src="client.js" defer></script>
    <script src="api.js" defer></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <title>Focus Timer - Diachrony</title>
</head>
<body>
    <header>
        <h1>Diachrony</h1>
    </header>
    <section class="content">
        <h2>Focus Timer</h2>

        <div class="panel timer-panel">
            <div class="timer" id="timer" x-data="">
                <span class="time" x-text="$store.timer.time()"></span>
            </div>
            <div class="controls" x-data="">
                <button @click="$store.timer.switch()"
                        x-text="$store.timer.switchText()">
                </button>
                <button @click="$store.timer.reset()"
                        :disabled="!$store.timer.focusing"
                        x-text="'finish'">
                </button>
            </div>
        </div>

        <hr>

        <div class="panel current-task-panel" x-data="">
            <div class="current-task-header">
                Current task:
            </div>
            <div class="current-task"
                :class="($store.tasks.selectedId === null) && 'no-task'"
                x-text="$store.tasks.currentTaskText()">
            </div>
        </div>

        <hr>

        <div class="panel add-task-panel" x-data="{ newTask: '' }">
            <input type="text"
                    size="15"
                    name="New task"
                    class="new-task"
                    placeholder="New task"
                    x-model="newTask"
                    @keydown.enter="await $store.tasks.addTask(newTask); newTask='';">
            <button class="add" id="add-task-button" @click="await $store.tasks.addTask(newTask); newTask='';">
                <svg width="100%" height="100%" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 8V16M8 12H16M22 12C22 17.5228 17.5228 22 12 22C6.47715 22 2 17.5228 2 12C2 6.47715 6.47715 2 12 2C17.5228 2 22 6.47715 22 12Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>
        
        <div class="panel task-panel">
             <div x-data="">
                <template x-for="task in $store.tasks.tasksByCompletion(false)" :key="task.id">
                <div class="task-container"
                    x-data="{ expanded: false }"
                    :class="{ 'selected': $store.tasks.selectedId === task.id}"
                    @click="$store.tasks.toggleSelect(task.id)">
                    <div class="task-container-row">
                        <div class="task-text"
                            x-text="task.task_text"
                            x-show="!expanded">
                        </div>
                        <input class="task-input"
                                size="15"
                                x-model="task.task_text"
                                x-show="expanded"
                                @click.stop="">
                        </input>
                        <button x-html="expanded ? $store.uparrow : $store.downarrow"
                                class="expand"
                                @click.stop="expanded = !expanded">
                        </button>
                    </div>
                    <div class="task-container-row"
                        x-show="expanded">
                        <button x-html="$store.checkmark" 
                                class="complete active"
                                @click.stop="$store.tasks.toggleComplete(task.id)">
                        </button>
                        <span class="tracked-time"
                            x-text="`Sessions tracked: ${ task.tracked_sessions } (${ formatTime(task.tracked_time) })`">
                        </span>
                        <button x-html="$store.trashcan"
                                class="delete"
                                @click.stop="$store.tasks.deleteTask(task.id)">
                        </button>
                    </div>
                </div>
                </template>
            </div>

            <hr class="task-divider">

             <div x-data="">
                <template x-for="task in $store.tasks.tasksByCompletion(true)" :key="task.id">
                <div class="task-container"
                    x-data="{ expanded: false }">
                    <div class="task-container-row">
                        <div class="task-text completed"
                            x-text="task.task_text"
                            x-show="!expanded">
                        </div>
                        <input class="task-input"
                                size="15"
                                x-model="task.task_text"
                                x-show="expanded"
                                @click.stop="">
                        </input>
                        <button x-html="expanded ? $store.uparrow : $store.downarrow"
                                class="expand"
                                @click.stop="expanded = !expanded">
                        </button>
                    </div>
                    <div class="task-container-row"
                        x-show="expanded">
                        <button x-html="$store.reverse" 
                                class="complete completed"
                                @click.stop="$store.tasks.toggleComplete(task.id)">
                        </button>
                        <span class="tracked-time"
                            x-text="`Sessions tracked: ${ task.tracked_sessions } (${ formatTime(task.tracked_time) })`">
                        </span>
                        <button x-html="$store.trashcan"
                                class="delete"
                                @click.stop="$store.tasks.deleteTask(task.id)">
                        </button>
                    </div>
                </div>
                </template>
            </div>
        </div>
    </section>
    <footer>
        <div>Mikhail Troshkin, 2026</div>
    </footer>
</body>
</html>
